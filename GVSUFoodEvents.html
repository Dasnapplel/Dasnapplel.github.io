    .events-table {
        width: 100%;

    td {

    @media screen and (max-width: 750px){
        
        tr {
            display: block;
            border: 2px solid var(--primary);
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 15px;
        }
        td, th {
            display: block;
        }
        th {

        }
