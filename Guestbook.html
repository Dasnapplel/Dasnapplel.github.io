<style>
  section.dark-mode input {
    background-color: #333;
    color:#fff;
  }
  input {
    width: 50vw;
  }
  .comment-page {
    gap: 15px;
    grid-template-columns: 49.5% 49.5%;
    display: none;
  }
  .comment-page:nth-child(1) {
    display: grid;
  }
  .comment {
    height: auto;
    width: 100%;
    outline: var(--primary) solid 2px;
    border-radius: 10px;
    padding: 15px;
    box-sizing: border-box;
  }
  .comment:hover {
    outline: var(--secondary) solid 4px;
  }

  .username {
    font-weight: bolder;
  }
  @media screen and (max-width: 700px){
    .comment-page {
      grid-template-columns: auto;
    }
  }

  .submitBtn {
    color: black;
    background-color: var(--primary);
    padding: 10px;
    border: 2px #121212 solid;
    border-radius: 10px;
  }
  .submitBtn:hover {
    background-color: var(--secondary);
    border-color: var(--secondary);
  }

  .page-btns {
    display: flex;
    flex-direction: row;
    margin-top: 10px;
    gap: 10px;
    justify-self: center;
  }
  .page-btns button {
    color: black;
    background-color: var(--primary);
    padding: 10px;
    border: 2px #121212 solid;
    border-radius: 10px;
  }
  .page-btns button:hover {
    background-color: var(--secondary);
    border-color: var(--secondary);
  }
</style>
